name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Builds the API (tsup) and web (next build); both type-check as part of
      # their build, so this gates compilation and types for apps/api + apps/web.
      - name: Build
        run: pnpm build

      # Runs vitest across the workspace. Passes today (no test files yet) and
      # will start gating once tests are added.
      - name: Test
        run: pnpm exec turbo run test -- --passWithNoTests

  lint:
    name: Lint mobile
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # apps/mobile is the only workspace with an ESLint config wired up.
      # See TODO: add ESLint configs for apps/api and apps/web, then switch
      # this to `pnpm lint` to cover the whole monorepo.
      - name: Lint mobile
        run: pnpm --filter=mobile lint
