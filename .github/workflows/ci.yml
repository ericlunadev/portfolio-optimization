name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Bundles the API (tsup, esbuild) and builds web (next build). next build
      # type-checks apps/web. The API is bundle-only: .d.ts emission is disabled
      # because better-auth's inferred `auth` type is not portable to a
      # declaration file under pnpm (TS2742). Type-check the API locally with
      # `pnpm --filter api typecheck`.
      - name: Build
        run: pnpm build

      # Runs vitest across the workspace. Passes today (no test files yet) and
      # will start gating once tests are added.
      - name: Test
        run: pnpm exec turbo run test -- --passWithNoTests

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Lints the whole monorepo: apps/api (typescript-eslint flat config),
      # apps/web (next lint / eslint-config-next), and apps/mobile (eslint-config-expo).
      - name: Lint
        run: pnpm lint
